services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_dev
    ports:
      # Host 5433 -> container 5432. Host 5432 is commonly occupied by other
      # Postgres instances on dev machines; 5433 avoids that collision.
      - "5433:5432"
    volumes:
      - atlas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_dev"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  atlas-postgres-data:

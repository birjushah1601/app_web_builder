# atlas-graphql-yoga (Plan T.2.2) — Bun 1.2+ + GraphQL Yoga 5.x + Pothos 4.x +
# Drizzle ORM + Zod + bun:test. Ships a /health JSON smoke endpoint, a /
# metadata route, and a /graphql endpoint serving GraphiQL in dev.
#
# Operator post-merge step:
#   cd packages/sandbox-e2b/templates/atlas-graphql-yoga
#   ./scripts/build-template.sh
# Then add the printed template_id to this file in a follow-up commit.

memory_mb = 2_048
ready_cmd = "curl -fsS http://localhost:3001/health > /dev/null"
start_cmd = "cd /code && PORT=3001 bun run src/server.ts"
dockerfile = "Dockerfile"
template_name = "atlas-graphql-yoga"
template_id = "gqdxzgm79y0rc2cxdopl"
# Listening port comes from Dockerfile's EXPOSE 3001 (no top-level `port` key
# in e2b.toml — E2B CLI infers the published port from EXPOSE).

# atlas-hono-bun (Plan T.2.1) — Bun 1.2 + Hono 4.x + Drizzle ORM 0.36+ +
# Zod 3 + postgres-js. Ships GET / + GET /health smoke endpoints out of the
# box. Alternative to atlas-fastapi for users who prefer TypeScript-native
# backends. Opt-in via per-project ATLAS_DEFAULT_SANDBOX_TEMPLATE=atlas-hono-bun.
#
# Operator post-merge step:
#   cd packages/sandbox-e2b/templates/atlas-hono-bun
#   ./scripts/build-template.sh
# Then add the printed template_id to this file in a follow-up commit.

memory_mb = 2_048
ready_cmd = "curl -fsS http://localhost:3000/health > /dev/null"
start_cmd = "cd /code && bun run src/index.ts"
dockerfile = "Dockerfile"
template_name = "atlas-hono-bun"
# template_id added by operator after first build via scripts/build-template.sh

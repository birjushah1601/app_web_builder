# atlas-dlt-python (Plan T.2.4) — Python 3.12 + dlt 1.4+ + DuckDB 1.x +
# dbt-core 1.9+ + dbt-duckdb + pandas + pyarrow + FastAPI status app +
# pytest + ruff + uv. Ships /health + /runs + /pipelines on :3000 so the
# E2B preview iframe shows pipeline status (data pipelines have no UI).
#
# Operator post-merge step:
#   cd packages/sandbox-e2b/templates/atlas-dlt-python
#   ./scripts/build-template.sh
# Then add the printed template_id to this file in a follow-up commit.

memory_mb = 2_048
ready_cmd = "curl -fsS http://localhost:3000/health > /dev/null"
start_cmd = "cd /code && /code/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 3000"
dockerfile = "Dockerfile"
template_name = "atlas-dlt-python"
# template_id added by operator after first build via scripts/build-template.sh

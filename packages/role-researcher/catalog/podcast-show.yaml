category: podcast-show
synonyms: [podcast-website, podcast-landing, show-page]
references:
  - name: Acquired
    url: https://www.acquired.fm
    why: Latest-episode in hero with embedded player, guest list with photos, episode-shownotes with timestamps, transcript available
    palette: ["#000000", "#ffffff", "#fbb040", "#1a1a1a"]
    typography:
      primary: Inter
    density: comfortable
    notes: Treats each episode like a documentary — long shownotes, sources cited, transcripts searchable.
  - name: Lex Fridman Podcast
    url: https://lexfridman.com/podcast
    why: Single-creator brand; episode list reverse-chrono; YouTube embed primary, audio secondary; guest-photo grid
    palette: ["#1a1a1a", "#ffffff", "#888888"]
    typography:
      primary: Roboto
    density: comfortable
  - name: NPR Planet Money
    url: https://www.npr.org/podcasts/510289/planet-money
    why: Public-radio polish; episode list with descriptions; transcript link per episode; subscribe-everywhere buttons
    palette: ["#cf102d", "#ffffff", "#000000", "#f5f5f5"]
    typography:
      primary: Inter
      secondary: Roboto Slab
    density: comfortable
patternsThatWin:
  - latest episode in hero with embedded player (audio + video if available)
  - subscribe buttons (Apple / Spotify / RSS / YouTube) prominent
  - guest list with photos + bios + episode links
  - shownotes with timestamps and source links
  - transcript available + searchable
patternsThatLose:
  - 'no embedded player on the homepage (forces user to leave)'
  - 'subscribe buttons hidden in a footer'
  - 'guest list as text-only (no photos)'
  - 'shownotes that are just episode titles with no timestamps'
  - missing transcripts (a11y + discoverability fail)

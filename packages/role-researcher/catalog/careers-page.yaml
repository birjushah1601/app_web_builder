category: careers-page
synonyms: [careers, jobs-page, hiring-page]
references:
  - name: Linear careers
    url: https://linear.app/careers
    why: Company values + benefits up top, role list with team / location filters, hiring-process timeline, no-bullshit voice
    palette: ["#0a0a0a", "#5e6ad2", "#f4f5f8"]
    typography:
      primary: Inter
    density: spacious
    notes: 'Uses "no recruiters, talk to the team" tone — works because the company actually delivers it.'
  - name: Vercel careers
    url: https://vercel.com/careers
    why: Async-first remote-friendly framing, role list filterable by team + location, employee photo grid
    palette: ["#000000", "#ffffff", "#0070f3"]
    typography:
      primary: Geist
    density: spacious
  - name: Stripe careers
    url: https://stripe.com/jobs
    why: Mission-first hero, very clear team breakdowns (Engineering, Sales, Ops, etc.), interview-process transparency
    palette: ["#0a2540", "#635bff", "#fafbfc"]
    typography:
      primary: SF Pro
    density: comfortable
patternsThatWin:
  - company values + benefits before the role list
  - role list with filters (team, location, employment type)
  - hiring-process timeline (steps + expected duration)
  - 'employee photos + quotes ("Why I work here")'
  - explicit salary range or salary band (where legal)
patternsThatLose:
  - 'role list as a giant unfiltered table (15 pages of postings)'
  - 'no hiring-process info (candidates do not know what to expect)'
  - 'generic stock photos of a "diverse team"'
  - missing salary information when comparable companies disclose
  - 'careers page that links to Workday or Greenhouse with zero context'

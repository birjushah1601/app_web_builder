category: status-page
synonyms: [status, uptime-page, incident-page]
references:
  - name: Vercel status
    url: https://www.vercel-status.com
    why: Traffic-light current state at the very top, subsystem list with individual statuses, incident history below
    palette: ["#000000", "#ffffff", "#10b981", "#ef4444", "#f59e0b"]
    typography:
      primary: Geist
    density: comfortable
    notes: Generated by Statuspage.io (Atlassian) — the de-facto template for status pages.
  - name: GitHub status
    url: https://www.githubstatus.com
    why: Subsystem grid (API, Webhooks, Actions, Pages, Packages) — each with last-90-days uptime sparkline
    palette: ["#0d1117", "#ffffff", "#3fb950", "#f85149"]
    typography:
      primary: Mona Sans
    density: comfortable
  - name: Cloudflare status
    url: https://www.cloudflarestatus.com
    why: Per-region status grid; clear "All Systems Operational" banner; subscribe-to-incidents prominent
    palette: ["#f48120", "#ffffff", "#1d1d1f", "#10b981"]
    typography:
      primary: Inter
    density: compact
patternsThatWin:
  - 'traffic-light banner ("All Systems Operational") at top'
  - subsystem list with individual status + 90-day uptime sparkline
  - incident history reverse-chronological with timestamps
  - '"Subscribe to updates" (email / RSS / webhook) prominent'
  - public, no-login required to view
patternsThatLose:
  - status pages behind a login wall
  - 'status reflecting "internal opinion" not actual probes'
  - silent green during a known outage (lost user trust)
  - no historical uptime data
  - incident posts without resolution timestamps

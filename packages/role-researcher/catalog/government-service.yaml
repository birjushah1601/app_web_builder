category: government-service
synonyms: [gov-service, public-sector-website, civic-tech]
references:
  - name: GOV.UK
    url: https://www.gov.uk
    why: Plain-language headlines, service-finder hero ("What do you want to do?"), high-contrast a11y, no marketing fluff
    palette: ["#0b0c0c", "#ffffff", "#1d70b8", "#f3f2f1"]
    typography:
      primary: GDS Transport
    density: comfortable
    notes: The most-studied gov design system in the world. Every choice serves the citizen, not the agency.
  - name: USAGov
    url: https://www.usa.gov
    why: Topic-search hero, multilingual toggle prominent, plain language; explicit "Find a federal service" focus
    palette: ["#005ea2", "#ffffff", "#1b1b1b"]
    typography:
      primary: Source Sans Pro
    density: comfortable
  - name: Singapore gov.sg
    url: https://www.gov.sg
    why: Service-finder + life-event navigation ("Birth", "Marriage", "Retirement"), bilingual design
    palette: ["#ec000d", "#ffffff", "#1a1a1a", "#f6f6f6"]
    typography:
      primary: Inter
    density: comfortable
patternsThatWin:
  - high-contrast accessibility (WCAG AAA where possible)
  - plain-language headlines (no acronyms, no jargon)
  - service-finder hero (search or task-based navigation)
  - multilingual toggle visible in nav
  - mobile-first (most citizens reach gov from phones)
patternsThatLose:
  - org-chart navigation (citizens do not care about your org structure)
  - low-contrast color palettes that fail WCAG AA
  - 'PDF-only forms with no web alternative'
  - 'jargon-heavy copy ("apply for a Form I-90 supplement")'
  - no multilingual support in regions with multiple official languages

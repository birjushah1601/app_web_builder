category: multi-tenant-saas-api
synonyms: [api-product, developer-api, saas-api]
references:
  - name: Stripe API
    url: https://stripe.com/docs/api
    why: Code sample in hero (curl + multi-language switcher), inline runnable examples, pricing per-call shown
    palette: ["#0a2540", "#635bff", "#fafbfc", "#425466"]
    typography:
      primary: SF Pro
      secondary: Source Code Pro
    density: comfortable
    notes: The Rosetta Stone of API marketing — every dev expects this layout now.
  - name: Twilio API
    url: https://www.twilio.com/docs
    why: Quickstart-first ("Send your first SMS in 5 minutes"), explicit per-product pricing, language switcher
    palette: ["#f22f46", "#ffffff", "#0d122b", "#606b85"]
    typography:
      primary: Twilio Sans
      secondary: Twilio Sans Mono
    density: comfortable
  - name: OpenAI API
    url: https://platform.openai.com/docs
    why: Playground prominent in nav (try before you build), token-pricing calculator, model cards inline
    palette: ["#000000", "#ffffff", "#10a37f"]
    typography:
      primary: Söhne
      secondary: Söhne Mono
    density: spacious
patternsThatWin:
  - code sample in the hero (the dev sees the API immediately)
  - language switcher (curl / JS / Python / Go / Ruby)
  - '"try in playground" CTA'
  - per-call / per-token pricing shown explicitly with examples
  - quickstart guide ("first call in N minutes") as the second section
patternsThatLose:
  - 'marketing copy without a code sample anywhere on the page'
  - language-locked examples (curl-only when most devs need a language SDK)
  - 'pricing as "Contact Sales" when devs want a back-of-envelope number'
  - playground gated behind signup before the dev can try a single call
  - 'docs and marketing on completely different domains with no link between them'

category: education-course
synonyms: [course-landing, online-course, education-program]
references:
  - name: Maven
    url: https://maven.com
    why: Cohort-based with explicit start dates; instructor photo + bio prominent; testimonials from named past students
    palette: ["#000000", "#ffffff", "#fad70a"]
    typography:
      primary: Inter
    density: comfortable
    notes: Cohort model means every course page has a countdown — adds urgency without being scuzzy.
  - name: Coursera
    url: https://www.coursera.org
    why: Syllabus + sample lesson visible without enrollment; partner-university branding; explicit time-commitment estimates
    palette: ["#0056d2", "#ffffff", "#1f1f1f", "#f5f7fa"]
    typography:
      primary: Open Sans
      secondary: Source Sans Pro
    density: comfortable
  - name: Khan Academy
    url: https://www.khanacademy.org
    why: Free-tier focused; mastery progress bars; subject-tree navigation; child-safe and warm
    palette: ["#14bf96", "#ffffff", "#21242c"]
    typography:
      primary: Lato
    density: spacious
patternsThatWin:
  - instructor photo + bio + credentials prominent
  - syllabus visible (not gated behind enrollment)
  - sample lesson / preview video accessible
  - 'pricing inline (or "free" labeled if it is)'
  - testimonials from named past students with their outcome
patternsThatLose:
  - 'instructor "ghost" — no name, no photo'
  - 'syllabus locked behind a "request info" form'
  - 'unattributed testimonials ("Great course!" — Anonymous)'
  - pricing hidden behind a sales call
  - 'vague duration ("self-paced") with no time estimate'

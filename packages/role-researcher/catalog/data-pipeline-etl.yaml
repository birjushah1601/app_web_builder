category: data-pipeline-etl
synonyms: [etl-tool, data-pipeline, data-integration]
references:
  - name: Fivetran
    url: https://www.fivetran.com
    why: Source-to-destination diagram in hero, connector logo grid (300+ sources), schedule + sync-status UI
    palette: ["#0073e6", "#ffffff", "#1f1f1f", "#e7f1ff"]
    typography:
      primary: Inter
    density: comfortable
    notes: The connector logo grid is THE visual signal — buyers scan to find their stack.
  - name: Airbyte
    url: https://airbyte.com
    why: Open-source positioning prominent; visual sync-status; source/destination connector marketplace
    palette: ["#615eff", "#ffffff", "#0a0d31"]
    typography:
      primary: Inter
    density: comfortable
  - name: dbt
    url: https://www.getdbt.com
    why: SQL-first transformation visual; lineage graph hero; analytics-engineer-focused brand voice
    palette: ["#ff694a", "#262a38", "#ffffff", "#f5f5f5"]
    typography:
      primary: Söhne
      secondary: IBM Plex Mono
    density: spacious
patternsThatWin:
  - source-to-destination diagram in the hero (visual data flow)
  - connector logo grid showing supported integrations
  - schedule UI (daily / hourly / cron) and last-sync timestamp
  - lineage graph for transformations (where does each column come from)
  - per-row error log when a sync partially fails
patternsThatLose:
  - 'abstract "data" hero illustration without showing a real pipeline'
  - hidden connector list (forces buyer to email sales)
  - 'silent failures with no per-row error visibility'
  - no schedule history (can't see when last sync ran)
  - 'transformations as opaque black-boxes with no lineage'

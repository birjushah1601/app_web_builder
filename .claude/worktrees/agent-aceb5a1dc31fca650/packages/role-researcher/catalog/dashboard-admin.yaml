category: dashboard-admin
synonyms: [admin-panel, internal-dashboard, ops-console]
references:
  - name: Linear
    url: https://linear.app
    why: Command palette as primary nav verb; keyboard-first; sparse chrome lets the data dominate
    palette: ["#0a0a0a", "#5e6ad2", "#f4f5f8", "#23252e"]
    typography:
      primary: Inter
    density: compact
    notes: Sidebar collapses to icons; cmd-k is the search-first surface for power users.
  - name: Notion
    url: https://www.notion.so
    why: Sidebar tree of pages, breadcrumb-driven navigation, content blocks as the unit of work
    palette: ["#ffffff", "#191919", "#37352f", "#2eaadc"]
    typography:
      primary: Inter
      secondary: Lato
    density: comfortable
    notes: Slash command opens a contextual block menu — same idea as cmd-k but inline.
  - name: Things 3
    url: https://culturedcode.com/things
    why: Restraint over abundance; focus on a single list at a time; native macOS feel
    palette: ["#fafafa", "#1a73e8", "#222222"]
    typography:
      primary: SF Pro
    density: spacious
patternsThatWin:
  - command palette (cmd-k) as primary navigation
  - sidebar nav with collapse-to-icons
  - search bar always visible at top
  - keyboard shortcuts surfaced in tooltips
  - sparse chrome — let the data dominate
patternsThatLose:
  - top-nav-only navigation in deep apps
  - 'hiding search behind a "Find" menu item'
  - dense toolbars with 20+ icons and no labels
  - modal-heavy workflows that block context

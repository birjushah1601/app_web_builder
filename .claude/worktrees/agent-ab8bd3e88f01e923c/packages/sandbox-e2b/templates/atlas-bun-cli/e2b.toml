# atlas-bun-cli (Plan T.2.5) — Bun 1.2+ runtime + Commander 12.x + ink 5.x +
# chalk 5 + zod + bun:test. Maps to artifactKind = "cli-tool".
#
# The CLI itself is exercised via the existing E2B Exec API; the sandbox's
# port-3000 surface is a tiny Bun.serve status page so the canvas iframe has
# something to render. (xterm.js terminal-emulator viewer is v2 polish.)
#
# Operator post-merge step:
#   cd packages/sandbox-e2b/templates/atlas-bun-cli
#   ./scripts/build-template.sh
# Then add the printed template_id to this file in a follow-up commit.

memory_mb = 1_024
ready_cmd = "curl -fsS http://localhost:3000 > /dev/null"
start_cmd = "cd /code && bun run src/server.ts"
dockerfile = "Dockerfile"
template_name = "atlas-bun-cli"
# template_id added by operator after first build via scripts/build-template.sh

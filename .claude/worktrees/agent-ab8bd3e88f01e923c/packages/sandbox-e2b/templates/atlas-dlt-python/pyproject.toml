[project]
name = "atlas-dlt-python-sandbox"
version = "0.1.0"
description = "dlt + DuckDB + dbt + FastAPI-status E2B sandbox template for Atlas (data-pipeline artifactKind)"
requires-python = ">=3.12"
dependencies = [
    # data-pipeline core
    "dlt[duckdb]>=1.4",
    "duckdb>=1.1",
    "dbt-core>=1.9",
    "dbt-duckdb>=1.9",
    "pandas>=2.2",
    "pyarrow>=18.0",
    # status surface (FastAPI app on :3000 so the E2B preview iframe shows ANYTHING)
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["dbt_project/dbt_packages", "dbt_project/target"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

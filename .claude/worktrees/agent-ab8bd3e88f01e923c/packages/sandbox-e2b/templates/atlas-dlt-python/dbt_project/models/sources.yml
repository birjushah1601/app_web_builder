version: 2

sources:
  - name: raw
    description: "Tables loaded by dlt pipelines into the local DuckDB warehouse."
    schema: atlas_dataset
    tables:
      - name: example
        description: "Example records from the canonical dlt pipeline (pipelines/example_pipeline.py)."
        columns:
          - name: id
            description: "Primary key."
            tests:
              - unique
              - not_null
          - name: value
            description: "Free-form value."
          - name: loaded_at
            description: "When dlt loaded the record."

models:
  - name: example_transform
    description: "Canonical example dbt model — passthrough view over the raw.example source."
    columns:
      - name: id
        tests:
          - unique
          - not_null

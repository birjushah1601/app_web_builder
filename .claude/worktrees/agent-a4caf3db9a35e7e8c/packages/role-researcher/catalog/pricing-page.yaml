category: pricing-page
synonyms: [pricing, plans, subscription-tiers]
references:
  - name: Linear pricing
    url: https://linear.app/pricing
    why: 3-tier comparison (Free / Standard / Plus), feature matrix below, FAQ at bottom; no dark patterns
    palette: ["#0a0a0a", "#5e6ad2", "#f4f5f8"]
    typography:
      primary: Inter
    density: comfortable
    notes: Annual/monthly toggle is honest — shows both prices, doesn't hide monthly behind a click.
  - name: Vercel pricing
    url: https://vercel.com/pricing
    why: Tier cards with "most popular" highlighted; usage-based add-on calculator; explicit free tier limits
    palette: ["#000000", "#ffffff", "#0070f3"]
    typography:
      primary: Geist
    density: spacious
  - name: Notion pricing
    url: https://www.notion.so/pricing
    why: Per-seat tiers with team-size selector; clear what is included at each level; FAQ addresses common objections
    palette: ["#ffffff", "#191919", "#2eaadc"]
    typography:
      primary: Inter
    density: comfortable
patternsThatWin:
  - 3 to 4 tiers max (decision paralysis above that)
  - '"most popular" or "recommended" highlight on the middle tier'
  - feature comparison matrix below the cards
  - annual/monthly toggle that shows BOTH prices, not just the discounted one
  - FAQ at the bottom addressing top objections (refunds, billing, downgrades)
patternsThatLose:
  - 7+ pricing tiers
  - 'enterprise tier with "Contact Sales" hiding the price entirely when other tiers show prices'
  - 'feature lists that hide the deal-breaker behind "+ everything in Pro"'
  - per-feature surcharges discovered only at checkout
  - usage-based pricing without a calculator or example bill

category: changelog-page
synonyms: [changelog, release-notes, whats-new]
references:
  - name: Linear changelog
    url: https://linear.app/changelog
    why: Reverse-chronological, dated entries with image + copy + tag; RSS link in nav
    palette: ["#0a0a0a", "#5e6ad2", "#f4f5f8"]
    typography:
      primary: Inter
    density: comfortable
    notes: Each entry has a single hero image (usually a product screenshot or short loop). Crisp.
  - name: Vercel changelog
    url: https://vercel.com/changelog
    why: Author byline, category tags (Edge, Build, CLI), one screenshot per entry
    palette: ["#000000", "#ffffff", "#0070f3"]
    typography:
      primary: Geist
    density: spacious
  - name: Stripe changelog
    url: https://stripe.com/blog/changelog
    why: Versioned API releases with breaking-change callouts, code-diff snippets inline
    palette: ["#0a2540", "#635bff", "#fafbfc"]
    typography:
      primary: SF Pro
      secondary: Source Code Pro
    density: comfortable
patternsThatWin:
  - reverse-chronological entries with explicit dates
  - one hero image / video per entry (loops for product motion)
  - category tags or filters (Feature / Fix / Breaking)
  - RSS / email subscribe link prominent
  - permalink + share button per entry
patternsThatLose:
  - 'undated entries ("Recently we added...")'
  - 'a single "What is new" page that overwrites itself each release'
  - text-only walls with no screenshots or motion
  - entries that bury the actual change in marketing copy
  - no way to subscribe (forces users to manually re-check)
